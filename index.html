<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="manifest" href="/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="마음보호">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1864/1864514.png">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js');
    });
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>마음 보호 10분 매뉴얼</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #5c6bc0; --accent: #ffcc80; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, 'Nanum Gothic', sans-serif; }
        body { margin: 0; background: linear-gradient(135deg, #e0e7ff 0%, #fef3c7 100%); height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text); }
        #root { width: 100%; max-width: 450px; height: 100%; padding: 15px; display: flex; align-items: center; justify-content: center; }
        .app-frame { width: 100%; height: 95%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; border: 2px solid white; position: relative; }
        
        /* 레이아웃 엔진 */
        .screen { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .center-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        
        /* 타이머 & 프로그레스 바 */
        .timer-header { padding: 30px 25px 15px; background: #1e293b; color: white; border-radius: 0 0 30px 30px; }
        .timer-val { font-size: 36px; font-weight: 900; color: #22d3ee; font-family: monospace; }
        .prog-bg { height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); transition: width 1s linear; }

        /* 미션 카드 */
        .mission-card { background: white; margin: 20px; border-radius: 30px; padding: 35px 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 320px; }
        .success-card { background: white; width: 100%; border-radius: 30px; padding: 30px 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 25px; }
        
        .btn-action { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 900; margin: 10px 20px 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 15px rgba(92, 107, 192, 0.2); width: calc(100% - 40px); }
        .btn-action:active { transform: scale(0.96); }

        /* 2048 보드 */
        .game-board { background: #bbada0; width: 280px; height: 280px; border-radius: 12px; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 20px auto; touch-action: none; }
        .tile { width: 58px; height: 58px; background: rgba(238, 228, 218, 0.35); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 18px; color: #776e65; }
        .tile-2 { background: #eee4da; } .tile-4 { background: #ede0c8; } .tile-8 { background: #f2b179; color: white; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bounce { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const SVGS = {
            Stage1: () => <svg width="120" height="120" viewBox="0 0 24 24" fill="#f472b6"><circle cx="12" cy="14" r="5"/><circle cx="7" cy="9" r="2"/><circle cx="10" cy="6" r="2"/><circle cx="14" cy="6" r="2"/><circle cx="17" cy="9" r="2"/></svg>,
            Stage5: () => <svg width="140" height="140" viewBox="0 0 24 24"><path d="M12 5c-1.6 0-3 1.3-3 3 0 .8.3 1.5.8 2.1C8.7 11.2 8 13.1 8 15c0 3.3 2.5 5 4 5s4-1.7 4-5c0-1.9-.7-3.8-1.8-4.9.5-.6.8-1.3.8-2.1 0-1.7-1.4-3-3-3z" fill="#1e293b"/><path d="M12 14l-1.5 1.5a2 2 0 0 0 3 0L12 14z" fill="#ef4444" /><circle cx="10.5" cy="8.5" r="0.8" fill="white"/><circle cx="13.5" cy="8.5" r="0.8" fill="white"/></svg>,
            Breath: () => <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#14b8a6" strokeWidth="2"><path d="M2 12h10m10 0h-2M7 16h10M5 8h12"/></svg>,
            Water: () => <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>,
            Find: () => <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" strokeWidth="2"><circle cx="12" cy="13" r="4"/><rect width="18" height="18" x="3" y="3" rx="2"/></svg>,
            Move: () => <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="2"><path d="M4 16v4h4m-4 0l16-16"/></svg>,
            Ear: () => <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2"><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3 3 0 1 1-6 0"/></svg>
        };

        const MISSION_POOL = [
            { title: "깊은 호흡", desc: "코로 4초 들이마시고 6초 내뱉으세요.", icon: <SVGS.Breath /> },
            { title: "물 한 잔", desc: "시원한 물을 마시며 목넘김에 집중하세요.", icon: <SVGS.Water /> },
            { title: "색깔 찾기", desc: "주변에서 <b>{color}</b> 물건 5개를 찾아보세요.", icon: <SVGS.Find /> },
            { title: "거꾸로 빼기", desc: "100에서 <b>{num}</b>을 0이 될 때까지 빼보세요.", icon: <SVGS.Breath /> },
            { title: "스트레칭", desc: "기지개를 크게 켜고 몸을 이완하세요.", icon: <SVGS.Move /> },
            { title: "귀 조물조물", desc: "귓바퀴를 위아래로 꾹꾹 주물러보세요.", icon: <SVGS.Ear /> }
        ];

        const App = () => {
            const [view, setView] = useState('HOME');
            const [missions, setMissions] = useState([]);
            const [idx, setIdx] = useState(0);
            const [timeLeft, setTimeLeft] = useState(600);
            const [board, setBoard] = useState(Array(16).fill(0));
            const [score, setScore] = useState(0);

            useEffect(() => {
                let t;
                if (view === 'STATIC' && timeLeft > 0) t = setInterval(() => setTimeLeft(p => p - 1), 1000);
                return () => clearInterval(t);
            }, [view, timeLeft]);

            const startStatic = () => {
                const color = ["빨간색", "파란색", "노란색", "초록색", "보라색"][Math.floor(Math.random()*5)];
                const num = [3, 4, 7, 8, 9][Math.floor(Math.random()*5)];
                // 6개 후보 중 5개를 랜덤 셔플하여 추출
                const shuffled = [...MISSION_POOL].sort(() => Math.random() - 0.5).slice(0, 5).map(m => ({
                    ...m, desc: m.desc.replace('{color}', color).replace('{num}', num)
                }));
                setMissions(shuffled); setIdx(0); setTimeLeft(600); setView('STATIC');
            };

            const handleStepComplete = () => {
                if(idx < missions.length - 1) {
                    setView('INTER_SUCCESS');
                    setTimeout(() => { setIdx(idx + 1); setView('STATIC'); }, 1500);
                } else {
                    confetti({ particleCount: 150, spread: 70 });
                    setView('FINAL_SUCCESS');
                }
            };

            // 2048 로직 유지
            const spawn = useCallback((b) => {
                const empty = b.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
                if (empty.length === 0) return b;
                const nb = [...b]; nb[empty[Math.floor(Math.random() * empty.length)]] = 2;
                return nb;
            }, []);

            const move = useCallback((dir) => {
                let nb = [...board]; let moved = false; let sc = score;
                const rot = (b) => { const r = Array(16).fill(0); for(let i=0; i<4; i++) for(let j=0; j<4; j++) r[j*4+(3-i)]=b[i*4+j]; return r; };
                let rs = {'LEFT':0, 'UP':3, 'RIGHT':2, 'DOWN':1}[dir];
                for(let i=0; i<rs; i++) nb = rot(nb);
                for(let i=0; i<4; i++) {
                    let r = nb.slice(i*4, i*4+4).filter(v=>v!==0);
                    for(let j=0; j<r.length-1; j++) { if(r[j]===r[j+1]){ r[j]*=2; sc+=r[j]; r.splice(j+1, 1); moved=true; } }
                    while(r.length<4) r.push(0);
                    r.forEach((v, j) => { if(nb[i*4+j]!==v) moved=true; nb[i*4+j]=v; });
                }
                for(let i=0; i<(4-rs)%4; i++) nb = rot(nb);
                if(moved) { setBoard(spawn(nb)); setScore(sc); if(sc>=500) { confetti(); setView('FINAL_SUCCESS'); } }
            }, [board, score, spawn]);

            return (
                <div className="app-frame">
                    {view === 'HOME' && (
                        <div className="center-screen fade-in">
                            <div className="bounce"><SVGS.Stage5 /></div>
                            <h2 style={{color:'#1e3a8a', marginTop:'30px'}}>안녕, 집사!</h2>
                            <button className="btn-action" onClick={() => setView('SELECT')}>시작하기</button>
                        </div>
                    )}

                    {view === 'SELECT' && (
                        <div className="center-screen fade-in">
                            <h2 style={{marginBottom:'40px'}}>방법을 골라줘!</h2>
                            <button className="btn-action" onClick={startStatic}>🧘 정적인 미션 (5단계)</button>
                            <button className="btn-action" style={{background:'white', color:'var(--primary)', border:'2px solid var(--primary)'}} onClick={() => { setBoard(spawn(spawn(Array(16).fill(0)))); setScore(0); setView('GAME'); }}>🎮 2048 퍼즐</button>
                        </div>
                    )}

                    {view === 'STATIC' && (
                        <div className="screen fade-in">
                            <div className="timer-header">
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end'}}>
                                    <span style={{fontSize:'12px', fontWeight:'bold', color:'#93c5fd'}}>KEEP GOING</span>
                                    <div className="timer-val">{Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,'0')}</div>
                                </div>
                                <div className="prog-bg"><div className="prog-fill" style={{width: `${(timeLeft/600)*100}%`}}></div></div>
                            </div>
                            <div className="mission-card">
                                {missions[idx]?.icon}
                                <h2 style={{color:'#1e3a8a', margin:'20px 0 10px'}}>{missions[idx]?.title}</h2>
                                <p style={{lineHeight:'1.6', fontSize:'18px'}} dangerouslySetInnerHTML={{__html: missions[idx]?.desc}}></p>
                                <span style={{fontSize:'12px', color:'#94a3b8', marginTop:'15px'}}>Step {idx+1} / 5</span>
                            </div>
                            <button className="btn-action" onClick={handleStepComplete}>미션 완료</button>
                        </div>
                    )}

                    {view === 'INTER_SUCCESS' && (
                        <div className="center-screen fade-in">
                            <div className="bounce"><SVGS.Stage1 /></div>
                            <div className="success-card">
                                <h2 style={{color:'#059669', margin:'0 0 10px'}}>젤리 발견!🐾</h2>
                                <p>앗, 귀여운 발바닥 젤리 발견!<br/>당신의 의지가 움직이기 시작했어요.</p>
                            </div>
                        </div>
                    )}

                    {view === 'FINAL_SUCCESS' && (
                        <div className="center-screen fade-in">
                            <div className="bounce"><SVGS.Stage5 /></div>
                            <div className="success-card" style={{marginBottom:'30px'}}>
                                <h2 style={{color:'#b45309', margin:'0 0 10px'}}>최고다냥!❤️</h2>
                                <p>고양이가 당신을 꼬옥 안아줘요!<br/>해낸 당신이 진짜 최고예요!</p>
                            </div>
                            <button className="btn-action" onClick={() => setView('HOME')}>메인으로 돌아가기</button>
                        </div>
                    )}

                    {view === 'GAME' && (
                        <div className="screen fade-in" style={{paddingTop:'40px'}}>
                            <div style={{textAlign:'center'}}>
                                <h3>Score: {score} / 500</h3>
                                <div className="game-board" onTouchStart={(e)=>window.ts={x:e.touches[0].clientX,y:e.touches[0].clientY}}
                                     onTouchEnd={(e)=>{
                                         const dx=e.changedTouches[0].clientX-window.ts.x, dy=e.changedTouches[0].clientY-window.ts.y;
                                         if(Math.abs(dx)>30||Math.abs(dy)>30) move(Math.abs(dx)>Math.abs(dy)?(dx>0?'RIGHT':'LEFT'):(dy>0?'DOWN':'UP'));
                                     }}>{board.map((v, i) => <div key={i} className={`tile tile-${v}`}>{v||''}</div>)}</div>
                            </div>
                            <button className="btn-action" style={{background:'#94a3b8'}} onClick={()=>setView('HOME')}>그만두기</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
